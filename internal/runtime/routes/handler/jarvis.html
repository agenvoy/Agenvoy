<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>agenvoy · jarvis</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100vh;overflow:hidden;background:#06090d;font-family:Inter,-apple-system,sans-serif;color:#e2e8f0}
#frame{width:100%;height:calc(100vh - 80px);border:none;background:#06090d}
#bar{position:fixed;bottom:0;left:0;right:0;background:#0c1118;border-top:1px solid rgba(255,255,255,.06);padding:0 12px}
#status{height:24px;display:flex;align-items:center;gap:6px;font-size:12px;color:#64748b;font-family:'SF Mono','JetBrains Mono',Consolas,monospace;overflow:hidden;white-space:nowrap}
#status .dot{width:6px;height:6px;border-radius:50%;background:#64748b;flex-shrink:0}
#status.active{color:#38bdf8}
#status.active .dot{background:#38bdf8;animation:pulse 1s ease infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
#row{height:56px;display:flex;align-items:center;gap:8px}
#row input{flex:1;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:10px 14px;color:#e2e8f0;font-size:15px;outline:none;font-family:inherit}
#row input:focus{border-color:rgba(56,189,248,.3)}
#row input:disabled{opacity:.4}
#row button{background:rgba(56,189,248,.12);color:#38bdf8;border:1px solid rgba(56,189,248,.2);border-radius:8px;padding:10px 18px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap}
#row button:hover{background:rgba(56,189,248,.2)}
#row button:disabled{opacity:.4;cursor:default}
</style>
</head>
<body>
<iframe id="frame" src="/jarvis/page/"></iframe>
<div id="bar">
<div id="status"><span class="dot"></span><span id="stxt">idle</span></div>
<div id="row">
<input id="input" type="text" placeholder="Ask anything..." autocomplete="off" autofocus>
<button id="send" type="button">Send</button>
</div>
</div>
<script>
(function(){
  var sid="jarvis";
  var input=document.getElementById("input");
  var btn=document.getElementById("send");
  var frame=document.getElementById("frame");
  var stBar=document.getElementById("status");
  var stTxt=document.getElementById("stxt");
  var busy=false;
  var reader=null;

  function patchFrameBg(){
    try{
      var d=frame.contentDocument;
      if(d&&d.documentElement){d.documentElement.style.minHeight="100vh";d.documentElement.style.background="#06090d"}
      if(d&&d.body){d.body.style.minHeight="100vh";if(!d.body.style.background&&!d.body.style.backgroundColor)d.body.style.background="#06090d"}
    }catch(e){}
  }
  frame.addEventListener("load",patchFrameBg);

  var es=new EventSource("/jarvis/listener");
  es.onmessage=function(){
    frame.src="/jarvis/page/?t="+Date.now();
    if(busy){
      if(reader){reader.cancel();reader=null}
      setStatus("EventDone","");
    }
  };

  var labels={
    EventAgentSelect:"selecting agent…",
    EventAgentResult:"agent ready",
    EventSkillResult:"skill matched",
    EventToolCall:"calling tool",
    EventToolCallStart:"running tool",
    EventToolCallEnd:"tool done",
    EventToolResult:"processing result",
    EventText:"generating…",
    EventTextDone:"rendering…",
    EventDone:"done",
    EventError:"error",
    EventExecError:"tool error"
  };

  function setStatus(type,detail){
    var s=labels[type]||type;
    if(detail)s+=": "+detail;
    stTxt.textContent=s;
    if(type==="EventDone"||type==="EventError"){
      stBar.className="";
      unlock();
    }else{
      stBar.className="active";
    }
  }

  function unlock(){
    busy=false;input.disabled=false;btn.disabled=false;input.focus();
  }

  function streamSSE(body){
    reader=body.getReader();
    var dec=new TextDecoder();
    var buf="";
    function pump(){
      reader.read().then(function(r){
        if(r.done){if(busy)unlock();return}
        buf+=dec.decode(r.value,{stream:true});
        var lines=buf.split("\n");
        buf=lines.pop();
        for(var i=0;i<lines.length;i++){
          var ln=lines[i];
          if(ln.indexOf("data: ")!==0)continue;
          try{
            var ev=JSON.parse(ln.slice(6));
            var detail="";
            if(ev.tool_name)detail=ev.tool_name;
            else if(ev.text&&ev.text.length<60)detail=ev.text;
            setStatus(ev.type,detail);
          }catch(e){}
        }
        pump();
      }).catch(function(){if(busy)unlock()});
    }
    pump();
  }

  function send(){
    var v=input.value.trim();
    if(!v||busy)return;
    busy=true;
    input.value="";
    input.disabled=true;
    btn.disabled=true;
    setStatus("sending","");
    stBar.className="active";
    fetch("/v1/send",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({content:v,session_id:sid,sse:true,web_mode:true,persist:true})
    }).then(function(resp){
      if(!resp.ok){setStatus("EventError","HTTP "+resp.status);return}
      if(resp.body)streamSSE(resp.body);
    }).catch(function(e){
      setStatus("EventError",e.message);
    });
  }

  btn.addEventListener("click",send);
  input.addEventListener("keydown",function(e){if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send()}});
  document.addEventListener("keydown",function(e){
    if(e.key!=="Escape"||busy)return;
    fetch("/jarvis/reset",{method:"POST"}).then(function(){
      frame.src="/jarvis/page/?t="+Date.now();
      setStatus("idle","");
      stBar.className="";
      input.value="";
      input.focus();
    });
  });
})();
</script>
</body>
</html>
